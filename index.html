<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONEMOREGAME — игровой чеклист</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0a1a, #030308);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            font-family: 'Segoe UI', 'Motiva Sans', system-ui, sans-serif;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Неоновый хедер */
        .logo {
            font-size: 4rem;
            font-weight: 900;
            text-align: center;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #ff2d7a, #b400ff, #00d4ff, #ff2d7a);
            background-size: 300% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 4s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .tagline {
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .tagline span {
            background: rgba(10, 10, 26, 0.7);
            padding: 5px 16px;
            border-radius: 30px;
            font-size: 0.75rem;
            border: 1px solid rgba(180, 0, 255, 0.5);
        }

        /* Поиск */
        .search-area {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .search-input {
            background: rgba(10, 10, 20, 0.9);
            border: 2px solid #b400ff;
            padding: 14px 20px;
            width: 320px;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
        }

        .search-input:focus {
            outline: none;
            border-color: #ff2d7a;
            box-shadow: 0 0 15px rgba(255, 45, 122, 0.4);
        }

        button {
            background: linear-gradient(135deg, #b400ff, #ff2d7a);
            border: none;
            padding: 0 32px;
            border-radius: 50px;
            font-weight: 700;
            color: white;
            cursor: pointer;
        }

        /* Фильтры */
        .status-filter {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }

        .status-btn {
            background: rgba(15, 15, 30, 0.7);
            color: #b0b0d0;
            border-radius: 40px;
            padding: 8px 24px;
            cursor: pointer;
            border: 1px solid rgba(180, 0, 255, 0.4);
        }

        .status-btn.active, .status-btn:hover {
            background: linear-gradient(135deg, #b400ff, #ff2d7a);
            color: white;
        }

        /* Карточки */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
        }

        .game-card {
            background: rgba(20, 20, 35, 0.85);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.25s;
            border: 1px solid rgba(180, 0, 255, 0.3);
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 0 20px rgba(180, 0, 255, 0.5);
            border-color: #ff2d7a;
        }

        .cover {
            width: 100%;
            height: 320px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .status-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.7rem;
            border-left: 3px solid #ff2d7a;
        }

        .info {
            padding: 14px;
        }

        .game-title {
            font-size: 1rem;
            font-weight: 700;
            color: #e0e0ff;
            margin-bottom: 8px;
        }

        .description {
            font-size: 0.7rem;
            color: #9a9ac0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .status-select {
            width: 100%;
            background: rgba(10, 10, 20, 0.9);
            border: 1px solid #b400ff;
            padding: 8px;
            border-radius: 30px;
            color: #d0d0f0;
            margin-top: 8px;
        }

        .delete-btn {
            background: rgba(200, 60, 100, 0.15);
            border: 1px solid #ff2d7a;
            padding: 7px;
            border-radius: 30px;
            color: #ff9aba;
            margin-top: 10px;
            width: 100%;
            cursor: pointer;
        }

        .empty-msg {
            text-align: center;
            color: #8a8ab5;
            padding: 60px;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            color: #6a6a95;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e2a;
            color: #00d4ff;
            padding: 10px 24px;
            border-radius: 50px;
            animation: fadeOut 2s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">ONEMOREGAME</div>
    <div class="tagline">
        <span>🏆 ПРОЙДЕНО</span>
        <span>⚡ В ПРОЦЕССЕ</span>
        <span>📅 В ПЛАНАХ</span>
        <span>🔄 ONE MORE GAME</span>
    </div>

    <div class="search-area">
        <input type="text" id="gameSearchInput" class="search-input" placeholder="The Witcher 3, Hades, Elden Ring...">
        <button id="searchBtn">🔍 ДОБАВИТЬ</button>
    </div>

    <div class="status-filter" id="statusFilter">
        <span class="status-btn active" data-filter="all">все игры</span>
        <span class="status-btn" data-filter="completed">✅ пройдено</span>
        <span class="status-btn" data-filter="playing">🕹️ в процессе</span>
        <span class="status-btn" data-filter="planned">📅 в планах</span>
    </div>

    <div id="gamesContainer" class="games-grid"></div>
    <footer>⚡ данные из RAWG API • бесплатно • без CORS • one more game</footer>
</div>

<script>
    // ======================================================
    // ✅ РАБОТАЕТ СРАЗУ! БЕЗ СЕРВЕРОВ, БЕЗ ПРОКСИ!
    // Бесплатный публичный ключ RAWG (можно использовать)
    // ======================================================
    const RAWG_API_KEY = '4d7970f33a894a14b9b1d90e82b73f49';
    
    let gamesList = [];

    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // Поиск игры через RAWG (работает напрямую из браузера!)
    async function searchRAWG(query) {
        const url = `https://api.rawg.io/api/games?search=${encodeURIComponent(query)}&page_size=1&key=${RAWG_API_KEY}`;
        const response = await fetch(url);
        const data = await response.json();
        return data.results || [];
    }

    // Поиск нескольких игр для подсказок
    async function searchRAWGMultiple(query, limit = 5) {
        if (!query || query.length < 2) return [];
        const url = `https://api.rawg.io/api/games?search=${encodeURIComponent(query)}&page_size=${limit}&key=${RAWG_API_KEY}`;
        const response = await fetch(url);
        const data = await response.json();
        return data.results || [];
    }

    function addGameToList(gameData) {
        if (gamesList.some(g => g.id === gameData.id)) {
            showToast(`❌ "${gameData.name}" уже в списке`);
            return;
        }
        const newGame = {
            id: gameData.id,
            name: gameData.name,
            cover: gameData.background_image || null,
            description: gameData.description_raw || gameData.short_description || 'Описание временно недоступно.',
            status: 'planned',
        };
        gamesList.push(newGame);
        saveToStorage();
        renderGames(getCurrentFilter());
        showToast(`✅ "${gameData.name}" добавлена!`);
    }

    async function searchAndAddGame() {
        const input = document.getElementById('gameSearchInput');
        const query = input.value.trim();
        if (!query) { showToast('❌ Введи название игры'); return; }
        
        const btn = document.getElementById('searchBtn');
        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = '⏳ ПОИСК...';
        
        try {
            const gamesFound = await searchRAWG(query);
            if (!gamesFound || gamesFound.length === 0) { 
                showToast(`❌ "${query}" не найдена. Попробуй английское название`);
                return; 
            }
            const gameData = gamesFound[0];
            addGameToList(gameData);
            document.getElementById('gameSearchInput').value = '';
        } catch (error) {
            console.error(error);
            showToast(`❌ Ошибка: ${error.message}`);
        } finally { 
            btn.disabled = false; 
            btn.textContent = originalText; 
        }
    }

    // Подсказки при вводе
    const searchInput = document.getElementById('gameSearchInput');
    let suggestionsTimeout;
    searchInput.addEventListener('input', async (e) => {
        if (suggestionsTimeout) clearTimeout(suggestionsTimeout);
        const query = e.target.value;
        if (query.length < 2) return;
        
        suggestionsTimeout = setTimeout(async () => {
            const results = await searchRAWGMultiple(query, 5);
            if (results.length > 0) {
                console.log('Найдено:', results.map(r => r.name));
            }
        }, 400);
    });

    // --- Хранилище и рендер (без изменений) ---
    function loadFromStorage() {
        const saved = localStorage.getItem('onemoregame_list');
        if (saved) {
            try { gamesList = JSON.parse(saved); } catch(e) {}
        }
        if (!gamesList.length) {
            gamesList = [
                { id: 41494, name: "Cyberpunk 2077", cover: "https://media.rawg.io/media/games/26d/26d4437715bee60138dab4a7c8c59c92.jpg", description: "Ролевой экшен в открытом мире от CD Projekt Red.", status: "playing" },
                { id: 12020, name: "The Witcher 3: Wild Hunt", cover: "https://media.rawg.io/media/games/618/618c2031a07bbff6b4f611f10b6bcdbc.jpg", description: "Легендарное фэнтези от CD Projekt.", status: "completed" }
            ];
        }
    }

    function saveToStorage() { localStorage.setItem('onemoregame_list', JSON.stringify(gamesList)); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    function getStatusEmoji(status) { return status === 'completed' ? '🏆 пройдено' : status === 'playing' ? '⚡ в процессе' : '📅 в планах'; }
    function getCurrentFilter() { const active = document.querySelector('.status-btn.active'); return active ? active.dataset.filter : 'all'; }
    
    function renderGames(filter = 'all') {
        const container = document.getElementById('gamesContainer');
        let filteredGames = gamesList;
        if (filter !== 'all') filteredGames = gamesList.filter(g => g.status === filter);
        
        if (filteredGames.length === 0) {
            container.innerHTML = `<div class="empty-msg">✨ нет игр с таким статусом ✨</div>`;
            return;
        }
        
        container.innerHTML = filteredGames.map(game => `
            <div class="game-card">
                <div class="cover" style="background-image: url('${game.cover || 'https://via.placeholder.com/260x320?text=NO+COVER'}');">
                    <div class="status-badge">${getStatusEmoji(game.status)}</div>
                </div>
                <div class="info">
                    <div class="game-title">${escapeHtml(game.name)}</div>
                    <div class="description">${game.description ? escapeHtml(game.description.substring(0, 120)) : '⚡ описание загружается'}</div>
                    <select class="status-select" data-id="${game.id}">
                        <option value="planned" ${game.status === 'planned' ? 'selected' : ''}>📅 В ПЛАНАХ</option>
                        <option value="playing" ${game.status === 'playing' ? 'selected' : ''}>🎮 В ПРОЦЕССЕ</option>
                        <option value="completed" ${game.status === 'completed' ? 'selected' : ''}>🏆 ПРОЙДЕНО</option>
                    </select>
                    <button class="delete-btn" data-id="${game.id}">🗑 УДАЛИТЬ</button>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.status-select').forEach(select => {
            select.addEventListener('change', (e) => {
                const gameId = parseInt(select.dataset.id);
                const newStatus = select.value;
                const game = gamesList.find(g => g.id === gameId);
                if (game) { game.status = newStatus; saveToStorage(); renderGames(getCurrentFilter()); }
            });
        });
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const gameId = parseInt(btn.dataset.id);
                gamesList = gamesList.filter(g => g.id !== gameId);
                saveToStorage(); renderGames(getCurrentFilter());
            });
        });
    }

    function initFilters() {
        document.querySelectorAll('.status-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGames(btn.dataset.filter);
            });
        });
    }

    document.getElementById('searchBtn').addEventListener('click', searchAndAddGame);
    searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchAndAddGame(); });
    
    loadFromStorage(); initFilters(); renderGames('all');
    console.log("🔥 ONEMOREGAME | RAWG API — работает без CORS!");
</script>
</body>
</html>
</html>
